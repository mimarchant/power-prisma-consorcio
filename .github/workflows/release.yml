name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Process CHANGELOG
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          python3 << 'EOF'
          import os, re
          from datetime import date

          version = os.environ["VERSION"]
          today = date.today().isoformat()

          with open("CHANGELOG.md", "r") as f:
              content = f.read()

          # Extract release notes (between [Unreleased] and next ## [)
          match = re.search(r'## \[Unreleased\]\n(.*?)(?=\n## \[)', content, re.DOTALL)
          if match:
              notes = match.group(1).strip()
              # Remove empty placeholder lines (just "-")
              notes_clean = "\n".join(
                  line for line in notes.split("\n")
                  if line.strip() not in ("-", "")
                  or line.startswith("###")
              )
              with open("release_notes.md", "w") as f:
                  f.write(notes_clean if notes_clean else "Maintenance release.")

              # Replace [Unreleased] section with versioned heading
              # Remove everything from ## [Unreleased] to the next ## [
              content = re.sub(
                  r'## \[Unreleased\]\n.*?(?=\n## \[)',
                  f'## [{version}] - {today}\n' + match.group(1),
                  content,
                  count=1,
                  flags=re.DOTALL
              )
          else:
              with open("release_notes.md", "w") as f:
                  f.write("Maintenance release.")

          with open("CHANGELOG.md", "w") as f:
              f.write(content)
          EOF

      - name: Commit updated CHANGELOG
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --cached --quiet && echo "No changes" || (git commit -m "chore: release v${VERSION}" && git push origin main)

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          name: v${{ steps.version.outputs.VERSION }}
          tag_name: ${{ github.ref_name }}
