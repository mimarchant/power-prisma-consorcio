name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Extract changelog for this version
        id: changelog
        run: |
          # Extract content between [Unreleased] and the next ## heading
          NOTES=$(sed -n '/^## \[Unreleased\]/,/^## \[/{/^## \[Unreleased\]/d;/^## \[/d;p}' CHANGELOG.md)
          # If empty, try extracting from the version heading directly
          if [ -z "$NOTES" ]; then
            NOTES=$(sed -n "/^## \[${{ steps.version.outputs.VERSION }}\]/,/^## \[/{/^## \[/d;p}" CHANGELOG.md)
          fi
          # Write to file for the release body
          echo "$NOTES" > release_notes.md

      - name: Update CHANGELOG.md
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          DATE=$(date +%Y-%m-%d)
          # Replace [Unreleased] with the version and date, add new empty Unreleased
          sed -i "s/^## \[Unreleased\]/## [${VERSION}] - ${DATE}/" CHANGELOG.md
          sed -i "/^# Changelog/a\\
\\
## [Unreleased]\\
### Added\\
-\\
\\
### Changed\\
-\\
\\
### Fixed\\
-" CHANGELOG.md

      - name: Commit updated CHANGELOG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "chore: release v${{ steps.version.outputs.VERSION }}" || true
          git push origin HEAD:main

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          name: v${{ steps.version.outputs.VERSION }}
          tag_name: ${{ github.ref_name }}
