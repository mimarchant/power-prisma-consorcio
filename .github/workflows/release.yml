name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Process CHANGELOG
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          python3 << 'EOF'
          import os, re
          from datetime import date

          version = os.environ["VERSION"]
          today = date.today().isoformat()

          with open("CHANGELOG.md", "r") as f:
              content = f.read()

          # Extract release notes (between [Unreleased] and next ## [)
          match = re.search(r'## \[Unreleased\]\n(.*?)(?=\n## \[)', content, re.DOTALL)
          notes = match.group(1).strip() if match else "No release notes."

          with open("release_notes.md", "w") as f:
              f.write(notes)

          # Replace [Unreleased] with version + date
          content = content.replace(
              "## [Unreleased]",
              f"## [Unreleased]\n### Added\n-\n\n### Changed\n-\n\n### Fixed\n-\n\n## [{version}] - {today}",
              1
          )

          with open("CHANGELOG.md", "w") as f:
              f.write(content)
          EOF

      - name: Commit updated CHANGELOG
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --cached --quiet && echo "No changes" || (git commit -m "chore: release v${VERSION}" && git push origin main)

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          name: v${{ steps.version.outputs.VERSION }}
          tag_name: ${{ github.ref_name }}
